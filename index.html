<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор группы PO232</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        h3 { margin-top: 0; text-align: center; font-size: 18px; color: #1c1e21; }
        
        #userNameDisplay { font-size: 20px; font-weight: bold; margin-bottom: 15px; display: block; text-align: center; }
        .big-timer { font-size: 32px; font-weight: bold; color: #4285F4; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }

        button { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; margin-bottom: 10px; color: white; }
        .btn-auth { background: #4285F4; }
        .btn-stop { background: #d93025; }
        .btn-break { background: #fbbc04; color: black; }
        .btn-exit { background: #70757a; }
        .btn-start { background: #34a853; }

        .monitor-header { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; font-weight: bold; }
        .user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .u-info { display: flex; align-items: center; gap: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; transition: 0.3s; }
        .online { background: #34a853; box-shadow: 0 0 8px #34a853; }
        
        .u-status { text-align: right; }
        .status-text { font-size: 13px; color: #666; display: block; }
        .status-timer { font-size: 11px; color: #4285F4; font-weight: bold; }

        #chatDisplay { height: 150px; overflow-y: auto; background: #f8f9fa; border-radius: 10px; padding: 10px; font-size: 14px; margin-bottom: 10px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 5px; }
        .chat-input { display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .msg { background: white; padding: 5px 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="card">
        <h3 id="profileHeader">Монитор PO232</h3>
        
        <div id="authSection">
            <button class="btn-auth" onclick="handleAuth()">Войти через Google</button>
        </div>

        <div id="studySection" style="display:none;">
            <span id="userNameDisplay"></span>
            <div class="big-timer">
                <span>⏱</span> <span id="mainTimerDisplay">0 сек.</span>
            </div>
            
            <button class="btn-stop" onclick="changeStatus('🏠 Дома', '#70757a', false)">⛔ Завершить сессию</button>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-break" onclick="changeStatus('☕ Перерыв', '#fbbc04', false)">☕ Перерыв</button>
                <button class="btn-exit" onclick="handleAuth()">Выход</button>
            </div>
            
            <button class="btn-start" style="margin-top:10px;" onclick="changeStatus('📚 Учусь', '#34a853', true)">📚 Начать учиться</button>
        </div>
    </div>

    <div class="card">
        <div class="monitor-header">👥 Монитор группы</div>
        <div id="groupList"></div>
    </div>

    <div class="card" id="chatSection" style="display:none;">
        <div class="monitor-header">💬 Общий чат</div>
        <div id="chatDisplay"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Написать сообщение...">
            <button style="width: 50px; background: #34a853; margin: 0;" onclick="sendMsg()">➤</button>
        </div>
    </div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    
    const supabase = createClient('https://mdkbkuffvgatlqauxpml.supabase.co', 'sb_publishable_FlSehNzF2mQ4DygdbbkoTQ_gThvpdt7');
    const SITE_URL = 'https://yasikov-maxim.github.io/PO232/';
    
    let currentUser = null;
    let mainTimerInterval = null;
    let elapsedSeconds = 0; // Уже прошедшее время
    let studyStartTime = null;

    // --- Авторизация ---
    window.handleAuth = async () => {
        const { data } = await supabase.auth.getUser();
        if (data?.user) {
            await supabase.auth.signOut();
            location.reload();
        } else {
            await supabase.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: SITE_URL } 
            });
        }
    };

    // --- Статусы ---
    window.changeStatus = async (text, color, isStudying) => {
        if (!currentUser) return;
        const now = new Date().toISOString();
        
        await supabase.from('profiles').update({
            status: text, 
            color: color, 
            last_seen: now,
            study_started_at: isStudying ? now : null 
        }).eq('id', currentUser.id);

        if (isStudying) { 
            studyStartTime = new Date(); 
            startMainTimer(studyStartTime); 
        } else if (text === '☕ Перерыв') {
            pauseMainTimer(); // при перерыве ставим на паузу
        } else {
            resetMainTimer(); // при завершении сессии сбрасываем таймер
        }

        fetchGroup();
    };

    // --- Таймеры ---
    function startMainTimer(startTime) {
        clearInterval(mainTimerInterval);
        studyStartTime = startTime;
        mainTimerInterval = setInterval(() => {
            const diff = Math.floor((new Date() - studyStartTime) / 1000) + elapsedSeconds;
            document.getElementById('mainTimerDisplay').innerText = formatTime(diff);
        }, 1000);
    }

    function pauseMainTimer() {
        clearInterval(mainTimerInterval);
        const diff = Math.floor((new Date() - studyStartTime) / 1000);
        elapsedSeconds += diff;
    }

    function resetMainTimer() {
        clearInterval(mainTimerInterval);
        elapsedSeconds = 0;
        document.getElementById('mainTimerDisplay').innerText = "0 сек.";
    }

    function formatTime(seconds) {
        if (seconds < 60) return seconds + " сек.";
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}м ${s}с`;
    }

    // --- Группа ---
    async function fetchGroup() {
        const { data } = await supabase.from('profiles').select('*').order('username');
        const list = document.getElementById('groupList');
        if (!data || !list) return;

        const now = new Date();
        list.innerHTML = data.map(u => {
            const isOnline = (now - new Date(u.last_seen)) < 70000; 
            let sessionTimeStr = "";
            
            if (u.study_started_at && u.status === '📚 Учусь') {
                const diff = Math.floor((now - new Date(u.study_started_at)) / 1000);
                const h = Math.floor(diff / 3600);
                const m = Math.floor((diff % 3600) / 60);
                const s = diff % 60;
                sessionTimeStr = `⏱ ${h}ч ${m}м ${s}с`;
            }

            return `
                <div class="user-row">
                    <div class="u-info">
                        <div class="dot ${isOnline ? 'online' : ''}"></div>
                        <strong>${u.username || 'Ученик'}</strong>
                    </div>
                    <div class="u-status">
                        <span class="status-text">${u.status || 'Дома'}</span>
                        <span class="status-timer">${sessionTimeStr}</span>
                    </div>
                </div>`;
        }).join('');
    }

    // --- Чат ---
    window.sendMsg = async () => {
        const input = document.getElementById('msgInput');
        if (!input.value.trim() || !currentUser) return;

        await supabase.from('messages').insert([{ 
            text: input.value, 
            user_name: currentUser.user_metadata.full_name 
        }]);
        input.value = '';
        loadChat();
    };

    async function loadChat() {
        const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
        const display = document.getElementById('chatDisplay');
        if (data && display) {
            display.innerHTML = data.reverse().map(m => `
                <div class="msg"><b>${m.user_name}:</b> ${m.text}</div>
            `).join('');
            display.scrollTop = display.scrollHeight;
        }
    }

    // --- Инициализация ---
    async function init() {
        const { data } = await supabase.auth.getUser();
        if (data?.user) {
            currentUser = data.user;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('studySection').style.display = 'block';
            document.getElementById('chatSection').style.display = 'block';
            document.getElementById('profileHeader').innerText = "Мой профиль";
            document.getElementById('userNameDisplay').innerText = currentUser.user_metadata.full_name;
            
            const { data: prof } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            if (prof?.study_started_at && prof.status === '📚 Учусь') {
                elapsedSeconds = Math.floor((new Date() - new Date(prof.study_started_at)) / 1000);
                startMainTimer(new Date());
            }

            setInterval(() => {
                supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id);
            }, 30000);
            
            loadChat();
            setInterval(loadChat, 3000);
        }
        
        fetchGroup();
        setInterval(fetchGroup, 2000);
    }
    init();
</script>
</body>
</html>
