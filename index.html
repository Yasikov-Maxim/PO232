<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://mdkbkuffvgatlqauxpml.supabase.co';
    const KEY = 'sb_publishable_FlSehNzF2mQ4DygdbbkoTQ_gThvpdt7';
    const supabase = createClient(URL, KEY);

    // НОВОЕ: обработка редиректа от Google
    async function handleAuthRedirect() {
        try {
            const { data, error } = await supabase.auth.getSession();
            if (error) throw error;
            
            if (data?.session) {
                // Если есть сессия, очищаем URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        } catch (error) {
            console.error('Auth redirect error:', error);
        }
    }

    // ИСПРАВЛЕНО: добавил try/catch и проверку ошибок
    async function toggleAuth() {
        try {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) { 
                await supabase.auth.signOut(); 
                location.reload(); 
            } else { 
                const { error } = await supabase.auth.signInWithOAuth({ 
                    provider: 'google', 
                    options: { 
                        redirectTo: window.location.href 
                    } 
                });
                if (error) throw error;
            }
        } catch (error) {
            console.error('Auth error:', error.message);
            alert('Ошибка входа: ' + error.message);
        }
    }
    window.toggleAuth = toggleAuth;

    // ИСПРАВЛЕНО: добавил проверку на наличие пользователя
    window.changeStatus = async (text, color, startTimer) => {
        try {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                alert('Сначала войдите в систему');
                return;
            }
            
            const updateData = { 
                status: text, 
                color: color, 
                last_seen: new Date().toISOString(),
                study_started_at: startTimer ? new Date().toISOString() : null
            };
            
            const { error } = await supabase.from('profiles').update(updateData).eq('id', user.id);
            if (error) throw error;
            
            fetchGroup();
        } catch (error) {
            console.error('Status update error:', error);
        }
    };

    async function fetchGroup() {
        try {
            const { data, error } = await supabase.from('profiles').select('*').order('username');
            if (error) throw error;
            
            const now = new Date();
            document.getElementById('groupList').innerHTML = data.map(u => {
                const isOnline = u.last_seen && (now - new Date(u.last_seen)) < 60000;
                let timeStr = "";
                if (u.study_started_at && u.status === '📚 Учусь') {
                    const diff = Math.floor((now - new Date(u.study_started_at)) / 1000);
                    timeStr = diff > 60 ? Math.floor(diff/60) + 'м ' + (diff%60) + 'с' : diff + ' сек.';
                }

                return `
                    <div class="user-item">
                        <div class="user-info">
                            <div class="status-dot ${isOnline ? 'online' : ''}"></div>
                            <strong>${u.username || 'Ученик'}</strong>
                        </div>
                        <div class="user-meta">
                            <div>${u.status || '🏠 Дома'}</div>
                            <div class="study-time">${timeStr ? '⏱ ' + timeStr : ''}</div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (error) {
            console.error('Fetch error:', error);
        }
    }

    async function init() {
        await handleAuthRedirect(); // ВАЖНО: сначала обрабатываем редирект
        
        try {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error) throw error;
            
            if (user) {
                document.getElementById('authBox').style.display = "none";
                document.getElementById('studyBox').style.display = "block";
                document.getElementById('userName').innerText = user.user_metadata?.full_name || user.email;
                
                // Heartbeat: каждые 30 сек обновляем "онлайн"
                setInterval(async () => {
                    try {
                        await supabase.from('profiles').update({ 
                            last_seen: new Date().toISOString() 
                        }).eq('id', user.id);
                    } catch (e) {
                        console.error('Heartbeat error:', e);
                    }
                }, 30000);
            }
        } catch (error) {
            console.error('Init error:', error);
        }
        
        fetchGroup();
        setInterval(fetchGroup, 5000);
    }
    
    init();
</script>
