<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор группы PO232</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        h3 { margin-top: 0; text-align: center; font-size: 18px; }
        
        /* Таймер */
        .timer-box { font-size: 28px; font-weight: bold; color: #4285F4; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
        
        /* Кнопки */
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; margin-bottom: 10px; color: white; }
        .btn-auth { background: #4285F4; }
        .btn-stop { background: #d93025; }
        .btn-break { background: #fbbc04; color: black; }
        .btn-exit { background: #70757a; }
        .btn-start { background: #34a853; }

        /* Список группы */
        .user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f2f5; }
        .u-info { display: flex; align-items: center; gap: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .online { background: #34a853; box-shadow: 0 0 8px #34a853; }
        .u-status { text-align: right; font-size: 12px; color: #666; }

        /* Чат */
        #chatDisplay { height: 150px; overflow-y: auto; background: #f8f9fa; border-radius: 10px; padding: 10px; font-size: 14px; margin-bottom: 10px; border: 1px solid #eee; }
        .chat-input { display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

    <div class="card">
        <h3 id="profileName">Мой профиль</h3>
        <div id="authContent">
            <button class="btn-auth" onclick="auth()">Войти через Google</button>
        </div>
        <div id="studyContent" style="display:none;">
            <div class="timer-box">⏱ <span id="timerDisplay">0 сек.</span></div>
            <button class="btn-stop" onclick="updateStatus('🏠 Дома', '#70757a', false)">⛔ Завершить сессию</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-break" onclick="updateStatus('☕ Перерыв', '#fbbc04', false)">☕ Перерыв</button>
                <button class="btn-exit" onclick="auth()">Выход</button>
            </div>
            <button class="btn-start" onclick="updateStatus('📚 Учусь', '#34a853', true)">Начать учиться</button>
        </div>
    </div>

    <div class="card">
        <h3>🎥 Монитор группы</h3>
        <div id="groupList"></div>
    </div>

    <div class="card">
        <h3>💬 Общий чат</h3>
        <div id="chatDisplay"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button style="width: 50px; margin: 0; background: #34a853;" onclick="send()">➤</button>
        </div>
    </div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    
    const supabase = createClient('https://mdkbkuffvgatlqauxpml.supabase.co', 'sb_publishable_FlSehNzF2mQ4DygdbbkoTQ_gThvpdt7');

    let me = null;

    // Авторизация
    window.auth = async () => {
        const { data } = await supabase.auth.getUser();
        if (data?.user) {
            await supabase.auth.signOut();
            location.reload();
        } else {
            await supabase.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: 'https://yasikov-maxim.github.io/PO232/' } 
            });
        }
    };

    // Смена статуса
    window.updateStatus = async (txt, clr, isStudy) => {
        if (!me) return;
        await supabase.from('profiles').update({
            status: txt, color: clr, 
            last_seen: new Date().toISOString(),
            study_started_at: isStudy ? new Date().toISOString() : null
        }).eq('id', me.id);
        refresh();
    };

    // Чат
    window.send = async () => {
        const inp = document.getElementById('msgInput');
        if (!inp.value || !me) return;
        await supabase.from('messages').insert({ 
            text: inp.value, 
            username: me.user_metadata.full_name || me.email,
            user_id: me.id
        });
        inp.value = '';
        loadChat();
    };

    async function loadChat() {
        const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
        const div = document.getElementById('chatDisplay');
        if (data && div) {
            div.innerHTML = data.reverse().map(m => `<div><strong>${m.username}:</strong> ${m.text}</div>`).join('');
            div.scrollTop = div.scrollHeight;
        }
    }

    async function refresh() {
        const { data } = await supabase.from('profiles').select('*').order('username');
        const list = document.getElementById('groupList');
        if (!data || !list) return;

        const now = new Date();
        list.innerHTML = data.map(u => {
            const isOnline = u.last_seen && (now - new Date(u.last_seen)) < 60000;
            let timeTxt = "";
            if (u.study_started_at && u.status === '📚 Учусь') {
                const diff = Math.floor((now - new Date(u.study_started_at))/1000);
                timeTxt = diff > 60 ? Math.floor(diff/60)+'м '+(diff%60)+'с' : diff+' сек.';
            }
            return `
                <div class="user-row">
                    <div class="u-info">
                        <div class="dot ${isOnline ? 'online' : ''}"></div>
                        <strong>${u.username || 'Ученик'}</strong>
                    </div>
                    <div class="u-status">
                        ${u.status || 'Дома'}<br>
                        <span style="color:#4285F4">${timeTxt ? '⏱ '+timeTxt : ''}</span>
                    </div>
                </div>`;
        }).join('');
    }

    async function init() {
        const { data } = await supabase.auth.getUser();
        if (data?.user) {
            me = data.user;
            document.getElementById('authContent').style.display = 'none';
            document.getElementById('studyContent').style.display = 'block';
            document.getElementById('profileName').innerText = me.user_metadata.full_name || me.email;
            
            // "Пульс" онлайна
            setInterval(() => {
                supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', me.id);
            }, 30000);
        }
        refresh(); loadChat();
        setInterval(refresh, 5000);
        setInterval(loadChat, 3000);
    }
    init();
</script>
</body>
</html>
